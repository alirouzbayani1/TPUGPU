<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TPUGPU Router Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,500;1,600&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <div class="hero-top">
          <img class="bagel-logo" src="/static/assets/logo/bagel-logo.svg" alt="Bagel Labs" />
        </div>
      </section>

      <section class="map-panel">
        <svg class="map-scene" viewBox="0 0 1000 520" aria-label="Distributed TPUGPU machine layout">
          <image
            class="world-map-image"
            href="/static/assets/graphics/world-map.png"
            x="0"
            y="0"
            width="1000"
            height="520"
            preserveAspectRatio="none"
          />

          <line id="lineUsEu" class="connection-line" x1="135" y1="175" x2="500" y2="110"></line>
          <line id="lineEuAsia" class="connection-line" x1="500" y1="110" x2="820" y2="215"></line>

          <g id="nodeTpu" class="map-node">
            <circle id="pinTpuHalo" class="pin-halo" cx="147" cy="175" r="16"></circle>
            <circle id="pinTpu" class="pin-dot" cx="147" cy="175" r="8"></circle>
            <text class="node-title" x="140" y="216">TPU expert</text>
            <text class="node-region" x="140" y="236">us-east5-a</text>
            <foreignObject x="132" y="246" width="190" height="118">
              <div xmlns="http://www.w3.org/1999/xhtml" class="machine-card">
                <div>device: v6e-1</div>
                <div>expert: strict_0_4_fm</div>
                <div>stack: jax / xla</div>
                <div>role: active backend</div>
              </div>
            </foreignObject>
          </g>

          <g id="nodeRouter" class="map-node">
            <circle id="pinRouterHalo" class="pin-halo" cx="500" cy="110" r="16"></circle>
            <circle id="pinRouter" class="pin-dot" cx="500" cy="110" r="8"></circle>
            <text class="node-title" x="492" y="151">CPU router</text>
            <text class="node-region" x="492" y="171">europe-west4-a</text>
            <foreignObject x="488" y="182" width="200" height="110">
              <div xmlns="http://www.w3.org/1999/xhtml" class="machine-card">
                <div>device: cpu vm</div>
                <div>state: x_t, t, y</div>
                <div>mode: top-1 routing</div>
                <div>transport: binary rpc</div>
              </div>
            </foreignObject>
            <foreignObject x="488" y="304" width="160" height="160">
              <div xmlns="http://www.w3.org/1999/xhtml" class="router-live-image">
                <canvas id="stateCanvas" width="320" height="320"></canvas>
              </div>
            </foreignObject>
          </g>

          <g id="nodeGpu" class="map-node">
            <circle id="pinGpuHalo" class="pin-halo" cx="820" cy="215" r="16"></circle>
            <circle id="pinGpu" class="pin-dot" cx="820" cy="215" r="8"></circle>
            <text class="node-title" x="812" y="256">GPU expert</text>
            <text class="node-region" x="812" y="276">asia-southeast1-a</text>
            <foreignObject x="812" y="286" width="190" height="126">
              <div xmlns="http://www.w3.org/1999/xhtml" class="machine-card">
                <div>device: a100 40gb</div>
                <div>role: expert b target</div>
                <div>stack: gpu / jax</div>
                <div>status: training path in progress</div>
              </div>
            </foreignObject>
          </g>
        </svg>

        <section class="controls">
          <label>
            Digit
            <input id="labelInput" type="number" min="0" max="9" value="2" />
          </label>
          <label>
            Steps
            <input id="stepsInput" type="number" min="10" max="200" value="40" />
          </label>
          <button id="runButton">Generate</button>
        </section>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
